services:
  dashboard:
    build: .
    ports:
      - "8080:80"
    depends_on:
      cycles-admin:
        condition: service_healthy
      cycles-server:
        condition: service_healthy
    networks:
      - cycles

  cycles-server:
    # Runtime-plane server. Independent release cadence from dashboard +
    # cycles-server-admin — keep in sync with docker-compose.prod.yml.
    image: ghcr.io/runcycles/cycles-server:0.1.25.15
    restart: unless-stopped
    ports:
      - "7878:7878"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      ADMIN_API_KEY: ${ADMIN_API_KEY:-admin-key}
      # Runtime-plane CORS: same rationale as cycles-admin (below) — accept
      # both docker (:8080) and Vite dev (:5173/:5174) origins so
      # ReservationsView's /v1/reservations calls don't 403 during dev.
      DASHBOARD_CORS_ORIGIN: http://localhost:8080,http://localhost:5173,http://localhost:5174
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7878/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cycles

  cycles-events:
    # Event-dispatch / webhook delivery worker. Consumes events emitted
    # by cycles-admin and cycles-server from Redis and fans them out
    # to registered webhook endpoints. Independent release cadence.
    # `.8` is the protocol v0.1.25.28 baseline — captures trace_id /
    # trace_flags / traceparent_inbound_valid on WebhookDelivery so the
    # dashboard's cross-surface correlation (v0.1.25.39) works on
    # delivery rows.
    image: ghcr.io/runcycles/cycles-server-events:0.1.25.8
    restart: unless-stopped
    ports:
      - "7980:7980"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      # Matches the empty default in cycles-admin — enable in prod by
      # setting a 32-byte key so webhook secrets round-trip encrypted.
      WEBHOOK_SECRET_ENCRYPTION_KEY: ""
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7980/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cycles

  cycles-admin:
    image: ghcr.io/runcycles/cycles-server-admin:0.1.25.36
    restart: unless-stopped
    ports:
      - "7979:7979"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      ADMIN_API_KEY: ${ADMIN_API_KEY:-admin-key}
      # Allow the docker dashboard origin (:8080) plus Vite's dev origins
      # (:5173 and :5174 fallback when :5173 is in TIME_WAIT from a prior
      # run). Spring's CorsFilter rejects mismatches with 403 "Invalid CORS
      # request" before reaching the AuthInterceptor — so a missing origin
      # surfaces as a 403 in DevTools with zero admin-server logs.
      DASHBOARD_CORS_ORIGIN: http://localhost:8080,http://localhost:5173,http://localhost:5174
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7979/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cycles

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cycles

volumes:
  redis-data:

networks:
  cycles:
