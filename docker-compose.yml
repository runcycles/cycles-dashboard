services:
  dashboard:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - cycles-admin
    networks:
      - cycles

  cycles-admin:
    image: ghcr.io/runcycles/cycles-admin:latest
    ports:
      - "7979:7979"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ADMIN_API_KEY=${ADMIN_API_KEY:-admin-key}
      - DASHBOARD_CORS_ORIGIN=http://localhost:8080
    depends_on:
      - redis
    networks:
      - cycles

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - cycles

networks:
  cycles:
