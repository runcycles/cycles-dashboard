server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Note: HSTS header belongs in the TLS config (nginx-ssl.conf.example), not here on port 80

    # SPA routing — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API calls.
    # Runtime-plane endpoints (reservations) go to cycles-server:7878.
    # Everything else on /v1/* goes to cycles-admin:7979.
    # Uses variables so nginx starts even if upstream is not yet resolvable.
    location ~ ^/v1/reservations(/|$) {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $upstream http://cycles-server:7878;
        proxy_pass $upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /v1/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $upstream http://cycles-admin:7979;
        # $request_uri preserves the full original path + query string.
        # Must be used (not a literal /v1/ suffix) because nginx does not
        # perform automatic URI substitution on proxy_pass when the target
        # contains a variable — the literal suffix would send just "/v1/"
        # to the upstream and strip the rest of the path. This bug was
        # masked in Vite dev (different proxy implementation) but broke
        # every non-reservations /v1/* call through the prod nginx.
        proxy_pass $upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
