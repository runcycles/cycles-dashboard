name: Build and Push Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write   # for Trivy SARIF upload to Security tab
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      # Two-phase build: load image locally for Trivy first, then push only
      # if scan passes. Second build-push-action call is a cache hit thanks
      # to type=gha cache from the first call.
      - name: Build image (no push, load for scan)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/runcycles/cycles-dashboard:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/runcycles/cycles-dashboard:${{ steps.version.outputs.version }}
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy-container

      - name: Push image (cache hit from first build)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/runcycles/cycles-dashboard:${{ steps.version.outputs.version }}
            ghcr.io/runcycles/cycles-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Smoke-test the *published* image, not a rebuild. Catches failure
  # modes we otherwise wouldn't see until someone pulled the tag in
  # prod: (a) the push silently failed or pushed a broken layer,
  # (b) the published image differs from what docker compose build
  # produces locally (e.g. multi-arch manifest issues).
  # Reuses the same probe script as the nightly E2E workflow.
  smoke-test-published:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Swap the build-from-source service for a pull-from-ghcr one.
      # sed over a one-line key is pragmatic; the alternative (compose
      # override with !reset build) is more fragile across compose
      # versions.
      - name: Rewrite compose to use published image
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          sed -i "s|build: \.|image: ghcr.io/runcycles/cycles-dashboard:${VERSION}|" docker-compose.yml
          echo "---- effective dashboard service ----"
          grep -A 6 "^  dashboard:" docker-compose.yml

      - name: Start stack with published image
        env:
          ADMIN_API_KEY: admin-bootstrap-key
        run: docker compose -f docker-compose.yml up -d --wait --wait-timeout 120

      - name: Run E2E probes against published image
        env:
          ADMIN_API_KEY: admin-bootstrap-key
          DASHBOARD_URL: http://localhost:8080
        run: bash scripts/e2e-probes.sh

      - name: Capture compose logs on failure
        if: failure()
        run: |
          mkdir -p smoke-logs
          for svc in dashboard cycles-admin cycles-server redis; do
            docker compose -f docker-compose.yml logs "$svc" > "smoke-logs/$svc.log" 2>&1 || true
          done

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smoke-test-logs
          path: smoke-logs/
          retention-days: 14

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v
