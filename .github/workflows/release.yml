name: Build and Push Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/runcycles/cycles-dashboard:${{ steps.version.outputs.version }}
            ghcr.io/runcycles/cycles-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Smoke-test the *published* image, not a rebuild. Catches failure
  # modes we otherwise wouldn't see until someone pulled the tag in
  # prod: (a) the push silently failed or pushed a broken layer,
  # (b) the published image differs from what docker compose build
  # produces locally (e.g. multi-arch manifest issues).
  # Reuses the same probe script as the nightly E2E workflow.
  smoke-test-published:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Swap the build-from-source service for a pull-from-ghcr one.
      # sed over a one-line key is pragmatic; the alternative (compose
      # override with !reset build) is more fragile across compose
      # versions.
      - name: Rewrite compose to use published image
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          sed -i "s|build: \.|image: ghcr.io/runcycles/cycles-dashboard:${VERSION}|" docker-compose.yml
          echo "---- effective dashboard service ----"
          grep -A 6 "^  dashboard:" docker-compose.yml

      - name: Start stack with published image
        env:
          ADMIN_API_KEY: admin-bootstrap-key
        run: docker compose -f docker-compose.yml up -d --wait --wait-timeout 120

      - name: Run E2E probes against published image
        env:
          ADMIN_API_KEY: admin-bootstrap-key
          DASHBOARD_URL: http://localhost:8080
        run: bash scripts/e2e-probes.sh

      - name: Capture compose logs on failure
        if: failure()
        run: |
          mkdir -p smoke-logs
          for svc in dashboard cycles-admin cycles-server redis; do
            docker compose -f docker-compose.yml logs "$svc" > "smoke-logs/$svc.log" 2>&1 || true
          done

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: smoke-test-logs
          path: smoke-logs/
          retention-days: 14

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v
